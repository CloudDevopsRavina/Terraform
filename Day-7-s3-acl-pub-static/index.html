<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Management</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    form { margin-bottom: 20px; }
    input { margin: 5px; padding: 8px; width: 250px; }
    button { padding: 8px 15px; }
    table { border-collapse: collapse; width: 80%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <h2>Add User Details</h2>
  <form id="userForm">
    <input type="text" id="name" placeholder="Name" required><br>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="tel" id="phone" placeholder="Phone Number" required><br>
    <button type="submit">Submit</button>
  </form>

  <h2>All Users</h2>
  <button onclick="fetchUsers()">Refresh Users</button>
  <table id="usersTable">
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Email</th><th>Phone</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Handle form submission
    document.getElementById("userForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
      };

      console.log("FE Log: Sending user data", user);

      try {
        const response = await fetch("http://localhost:5000/api/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
        });

        const result = await response.json();
        console.log("FE Log: Response from backend", result);

        // Refresh users after adding
        fetchUsers();
      } catch (err) {
        console.error("FE Log: Error communicating with backend", err);
      }
    });

    // Fetch and display users
    async function fetchUsers() {
      console.log("FE Log: Fetching users list");
      try {
        const response = await fetch("http://3.108.238.213/api/users");
        const users = await response.json();

        const tbody = document.querySelector("#usersTable tbody");
        tbody.innerHTML = "";

        users.forEach(user => {
          const row = `<tr>
            <td>${user.id}</td>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.phone}</td>
          </tr>`;
          tbody.innerHTML += row;
        });

        console.log("FE Log: Users displayed", users);
      } catch (err) {
        console.error("FE Log: Error fetching users", err);
      }
    }

    // Load users on page load
    window.onload = fetchUsers;
  </script>
</body>
</html>
